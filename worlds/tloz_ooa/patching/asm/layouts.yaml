
04//applyExtraTileSubstitutions: |
  push bc
  push de
  call getThisRoomFlags
  ld e,a
  ld hl,tileSubTable
  ld a,(wActiveGroup)
  ld b,a
  ld a,(wActiveRoom)
  ld c,a
  @loop:
  ldi a,(hl)
  cp $ff
  jr z,@done
  cp b
  jr nz,@groupMismatch
  ldi a,(hl)
  cp c
  jr nz,@roomMismatch
  ldi a,(hl)
  and e
  jr nz,@flagMismatch
  push de
  ld d,$cf
  ldi a,(hl)
  ld e,a
  ldi a,(hl)
  ld (de),a
  pop de
  jr @loop
  @groupMismatch:
  inc hl
  @roomMismatch:
  inc hl
  @flagMismatch:
  inc hl
  inc hl
  jr @loop
  @done:
  pop de
  pop bc
  call applyAllTileSubstitutions
  ret

00/38c0/: call applyExtraTileSubstitutions

# data for applyAllTileSubstitutions: group,room,flags,yx,tile
04//tileSubTable: |
    /include tileReplacementsTable
    db $ff

# burning the first tree in yoll graveyard should set room flag 1 so that it
# can be gone for good (see tileSubTable).
06//removeYollTreeWhenBurned: |
    push af
    ld a,($ff00+8f)
    cp $0c
    jr nz,@done
    push bc
    ld bc,$6b00
    call compareRoom
    jr nz,@next
    ld hl,$c76b
    set 1,(hl)
    @next:
    pop bc
    @done:
    pop af
    ld hl,wTotalSignsDestroyed
    ret
06/47aa/: call removeYollTreeWhenBurned

# set room flag for tunnel behind keep when defeating great moblin (see
# tileSubTable).
0f//openMoblinKeepTunnel: |
    ld hl,$c709
    set 0,(hl)
    ld hl,$cada
    ret
0f/7f3e/: call openMoblinKeepTunnel

# set room flag for other side of symmetry city bridge at end of building
# cutscene (see tileSubTable).
15//setBridgeFlag: |
    push hl
    xor a
    ld (wDisabledObjects),a
    ld a,$25
    call setGlobalFlag
    ld hl,$c724
    set 1,(hl)
    pop hl
    ret
0c/7a6f/: |
  db asm15
  dw setBridgeFlag

