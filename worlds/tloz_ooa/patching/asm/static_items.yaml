0a//staticItemsReplacementsTable: /include staticItemsReplacementsTable


0a//staticItemsReplacementsLookup_body: |
  push bc
  ld a,(wActiveGroup)
  ld b,a
  ld a,(wActiveRoom)
  ld c,a
  ld e,$02
  ld hl,staticItemsReplacementsTable
  call searchDoubleKey
  pop bc
  ret nc
  ld b,(hl) # item id
  inc hl
  ld c,(hl) # item subid
  ret
00//staticItemsReplacementsLookup: |
  push de
  push hl
  ld e,$0a
  ld hl,staticItemsReplacementsLookup_body
  call interBankCall
  pop hl
  pop de
  ret

# staticHeartPiece
10/74bd/: call staticItemsReplacementsLookup

