# dig up item on south shore regardless of ricky state
# Dirt monticule
04/6b71/: | 
  call getThisRoomFlags
  bit 5,(hl)
  jr z,@end
  ld a,$3a
  ld (wRoomLayout+$24),a
  @end:
  ret
# Interaction
0a/5e29/: | 
  call getThisRoomFlags
  bit 5,(hl)
  jr nz,@delete
  ld bc, locations.southShoreDirt
  call createTreasure
  ret nz
  call objectCopyPosition
  @delete:
  jp interactionDelete