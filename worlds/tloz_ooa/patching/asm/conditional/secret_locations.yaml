# LOCATIONS THAT DON'T NORMALLY REQUIRE USER SECRET INPUT

# -------------------------------------------------------

# Gives a randomized item to link after he rescues zelda from black tower in the present.
15/7755/: |
  ld bc,locations.zeldaRescue
  jp spawnTreasureOnLink

# sea of storm present chest (not worried about an overwrite since the new game option just takes the user to the input screen now.)
10/79ad/: dwbe locations.seaofstormpresent


