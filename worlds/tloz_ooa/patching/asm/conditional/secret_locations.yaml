# LOCATIONS THAT DON'T NORMALLY REQUIRE USER SECRET INPUT

# -------------------------------------------------------

# Gives a randomized item to link after he rescues zelda from black tower in the present.
15/7755/: |
  ld bc,locations.zeldaRescue
  jp spawnTreasureOnLink

# sea of storm present chest (not worried about an overwrite since the new game option just takes the user to the input screen now.)
10/79ad/: dwbe locations.seaofstormpresent


# LOCATIONS THAT DO NOT REQUIRE A USER TO HAVE AQUIRED AN ITEM FROM THEIR NPCS  

# -----------------------------------------------------------------------------

# GLOBALFLAG_DONE_PLEN_SECRET

# Forces plen to ask for a secret.
15/7acc/: dw $7ada

# Custom script that gives link a randomized item while keeping things vanilla.
15/7aee/: |
  db showtext,$37,$02,giveitem,locations.plenSecret.id,locations.plenSecret.subid,setglobalflag,$71,showtext,$37,$04,jumpalways
  dw $7b11


# GLOBALFLAG_DONE_FAIRY_SECRET

# check for the won fairy game flag instead of the game finished flag
09/5f78/: ld a,GLOBALFLAG_WON_FAIRY_HIDING_GAME

# Forces the secret to be valid
0c/6322/: dwbe $6330

# Gives link a treasure
0c/6336/: sbc a,locations.fairySecret.id


# GLOBALFLAG_DONE_SYMMETRY_SECRET

# Forces the sisters to ask for a secret after the tuni nut was placed on the pedestal.
15/7849/: |
  db jumpifglobalflagset,GLOBALFLAG_TUNI_NUT_PLACED
  dw $7890

# Forces the secret to be valid
15/78a2/: dwbe $78af

# Gives link a treasure
15/78d0/: db giveitem,locations.symmetrySecret.id,locations.symmetrySecret.subid


# GLOBALFLAG_DONE_TOKAY_SECRET

# Forces the present tokay to ask for a secret.
0c/6263/: dwbe $6269

# Forces the secret to be valid
0c/6285/: dwbe $6293

# Gives link a treasure
0c/62cf/: sbc a,locations.wildTokaySecret.id

# Prevent tokay secret from giving link a bomb refill
15/5c17/: add a,$00


# GLOBALFLAG_DONE_TROY_SECRET

# Forces troy to ask for a secret.
15/79b2/: dwbe $79b7

# Forces the secret to be valid
15/79dc/: dwbe $79eb

# Custom script that gives link an item while attempting to keep things vanilla.
15/7a26/: db showtext,$2c,$0c,orroomflag,$08,giveitem,locations.troySecret.id,locations.troySecret.subid,setglobalflag,$70


# GLOBALFLAG_DONE_ELDER_SECRET

# Check for a fairy won hidding game flag instead of the game finished flag
0a/6a8f/: ld a,GLOBALFLAG_WON_FAIRY_HIDING_GAME

# Forces the secret to be valid
0c/504f/: dwbe $505e

# Custom script that gives link an item while attempting to keep things vanilla.
0c/517c/: |
  db orroomflag,$04,giveitem,locations.elderSecret.id,locations.elderSecret.subid,setglobalflag,$76,generatesecret,$18,showtext,$31,$3b,enableinput,jumpalways
  dw $5072

# GLOBALFLAG_DONE_KING_ZORA_SECRET

# Check to see if the fairy won hiding game flag was set instead of the game finished flag. (you need the rolling sea essence to get his secret.)
0b/5472/: ld a,GLOBALFLAG_WON_FAIRY_HIDING_GAME

# Forces the secret to be valid
0c/7b18/: dwbe $7b26

# Gives link a treasure
0c/7b45/: db orroomflag,$40,giveitem,locations.kingZoraSecret.id,locations.kingZoraSecret.subid,retscript


# SECRETS THAT AQUIRE THAT A USER GOT AN ITEM FROM IT'S NPC BEFOREHAND:

# ----------------------------------------------------------------------

# GLOBALFLAG_DONE_TINGLE_SECRET

# Forces tingle to ask for a secret.
0c/7e50/: |
  db jumpifglobalflagset,$46
  dw $7e8e
  
# Forces the secret to be valid
0c/7e9b/: dwbe $7ea8

# Gives link a randomized item.
0c/7eaa/: |
  db orroomflag,$60,giveitem,locations.tingleSecret.id,locations.tingleSecret.subid,jumpalways
  dw $7eb4


# GLOBALFLAG_DONE_LIBRARY_SECRET

# Check for flag $4f (which is an unused global flag btw) instead of the game finished flag.
09/6610/: ld a,$4f
15/5d50/: db jumpifglobalflagset,$4f ; GLOBALFLAG_4F

# Custom script that gives link a randomized item and then warps link out without generating a secret (makes sense because he will then just go back to who he was in an unlinked game.)
15/5d69/: |
  db showtext,$33,$12,callscript
  dw $518b
  db orroomflag,$02,giveitem,locations.librarySecret.id,locations.librarySecret.subid,showtext,$33,$0c
  /include unsetglobalflag_librarySecret
  db jumpalways
  dw $5d93


# GLOBALFLAG_DONE_MAMAMU_SECRET

# Forces mamamu to ask for a secret if a doggie mask is handed to her.
15/5df4/: db jumpifroomflagset,$20

# Forces the secret to be valid
15/5e4b/: dwbe $5e58

# Custom script that gives link a randomized item (could not keep this vanila)
15/5e77/: |
  db jumpifroomflagset,$40
  dw $5e8f
  db disableinput,orroomflag,$40,giveitem,locations.mamamuSecret.id,locations.mamamuSecret.subid,enableinput,jumpalways
  dw $5e92
