# This patch injects "consumption" of some items when they are used in-game, removing them from inventory.
# This makes sense in correlation with subscreen_1_improvement, where all owned items are displayed
# and having a reduced set of owned items make the screen more manageable.
# This is especially useful for items the vanilla game considered as one with different subids
# (trade items, rusty/pirate's bell...).

# Add a "remove item" script command attached to unused script byte 0xdc
0c//scriptCmd_removeItem: |
  pop hl
  inc hl
  ldi a,(hl)
  call loseTreasure
  ret
0c/40c1/: dw scriptCmd_removeItem


# Add a "returnToScriptHelper" script command attached to unused script byte 0xc5
0c//scriptCmd_returnToBigBuffer: |
  pop hl
  inc hl
  ldi a,(hl)
  ld l,a
  ld h,$c3
  ret
0c/4093/: dw scriptCmd_returnToBigBuffer

# Lose dungeon keys when used in keyholes for inventory cleansing
06//loseKeyInsideKeyhole: |
    ld (wSubscreen1CurrentSlotIndex),a
    call checkTreasureObtained
    jr nc,@done
    ld a,(wSubscreen1CurrentSlotIndex)
    call loseTreasure
    scf
    @done:
    ret
06/423c/: call loseKeyInsideKeyhole

# Inject removal subscripts in some unused space (impa cinematic at 0c/51bb)
# NOTE : All trade items (except toilet hand and maple) have their script in the 15 bank, and are loaded with load script function
0c/51bb/removePoeClock: |
  db loseitem,TREASURE_POE_CLOCK
  db $be,$00 # removed line (ending interaction)
15/5f13/: dwbe removePoeClock # jump to removePoeClock, removing the last bit of the script, so no need to jump back, yay.

0c/51bf/removeStationery: |
  db $98,$09 # removed line (Show Txt)
  db loseitem,TREASURE_STATIONERY
  db $66,$9f  # jump back to 506b
0c/669d/: dwbe removeStationery # jump to removeStationery, it's the easy one.

